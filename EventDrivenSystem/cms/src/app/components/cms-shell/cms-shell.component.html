<div class="shell" [class.collapsed]="collapsed()">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">

    <!-- Brand -->
    <div class="sidebar-brand">
      <div class="brand-logo">
        <svg viewBox="0 0 40 40" fill="none">
          <rect width="40" height="40" rx="12" fill="url(#brand-grad)"/>
          <path d="M13 28c0-3.87 3.13-7 7-7s7 3.13 7 7" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
          <circle cx="20" cy="16" r="4.5" fill="#fff"/>
          <defs>
            <linearGradient id="brand-grad" x1="0" y1="0" x2="40" y2="40">
              <stop stop-color="#6366f1"/>
              <stop offset="1" stop-color="#a855f7"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="brand-label" *ngIf="!collapsed()">
        <span class="brand-name">SubPros</span>
        <span class="brand-tag">Admin CMS</span>
      </div>
      <button class="collapse-trigger" (click)="toggle()" [title]="collapsed() ? 'Expand' : 'Collapse'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path *ngIf="!collapsed()" d="M11 19l-7-7 7-7M18 19l-7-7 7-7"/>
          <path *ngIf="collapsed()" d="M13 5l7 7-7 7M6 5l7 7-7 7"/>
        </svg>
      </button>
    </div>

    <!-- Nav -->
    <nav class="sidebar-nav">

      <!-- Overview -->
      <a routerLink="/cms/overview" routerLinkActive="active" class="nav-overview" [title]="collapsed() ? 'Overview' : ''">
        <div class="nav-icon-wrap indigo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 5a1 1 0 011-1h4a1 1 0 011 1v5a1 1 0 01-1 1H5a1 1 0 01-1-1V5zm10 0a1 1 0 011-1h4a1 1 0 011 1v2a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zM4 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1v-4zm10-3a1 1 0 011-1h4a1 1 0 011 1v7a1 1 0 01-1 1h-4a1 1 0 01-1-1v-7z"/>
          </svg>
        </div>
        <span class="nav-label" *ngIf="!collapsed()">Overview</span>
      </a>

      <!-- Sections -->
      <div *ngFor="let section of sections" class="nav-group">

        <!-- Section header (expanded) -->
        <button *ngIf="!collapsed()" class="nav-group-header" (click)="toggleSection(section.id)">
          <span class="ngh-dot" [class]="'dot-' + section.color"></span>
          <span class="ngh-label">{{ section.label }}</span>
          <svg class="ngh-chevron" [class.open]="isSectionOpen(section.id)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M19 9l-7 7-7-7"/>
          </svg>
        </button>

        <!-- Section divider (collapsed) -->
        <div *ngIf="collapsed()" class="collapsed-divider" [title]="section.label">
          <div class="cd-dot" [class]="'dot-' + section.color"></div>
        </div>

        <!-- Items -->
        <div class="nav-items" [class.open]="isSectionOpen(section.id) || collapsed()">
          <a *ngFor="let item of section.items"
             [routerLink]="item.path"
             routerLinkActive="active"
             [class]="'nav-link accent-' + section.color"
             [title]="collapsed() ? item.label : ''">
            <div class="nav-icon-wrap" [class]="'color-' + section.color">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path [attr.d]="item.icon"/>
              </svg>
            </div>
            <span class="nav-label" *ngIf="!collapsed()">{{ item.label }}</span>
          </a>
        </div>
      </div>
    </nav>

    <!-- Footer -->
    <div class="sidebar-footer" *ngIf="currentUser$ | async as user">
      <div class="sf-avatar">{{ initials(user) }}</div>
      <div class="sf-info" *ngIf="!collapsed()">
        <span class="sf-name">{{ user.firstName }} {{ user.lastName }}</span>
        <span class="sf-role">
          <span class="online-dot"></span>
          Super Admin
        </span>
      </div>
      <button class="sf-logout" (click)="logout()" title="Sign out" *ngIf="!collapsed()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
        </svg>
      </button>
    </div>
  </aside>

  <!-- ── Main ── -->
  <div class="main-area">

    <!-- Topbar -->
    <header class="topbar">
      <div class="tb-left">
        <div class="page-meta">
          <div class="page-icon" [class]="'pi-' + activeColor">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 5a1 1 0 011-1h4a1 1 0 011 1v5a1 1 0 01-1 1H5a1 1 0 01-1-1V5zm10 0a1 1 0 011-1h4a1 1 0 011 1v2a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zM4 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1v-4zm10-3a1 1 0 011-1h4a1 1 0 011 1v7a1 1 0 01-1 1h-4a1 1 0 01-1-1v-7z"/>
            </svg>
          </div>
          <div>
            <div class="tb-breadcrumb">
              <span class="bc-root">CMS</span>
              <svg viewBox="0 0 6 10" fill="none" width="6" height="10"><path d="M1 9l4-4-4-4" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"/></svg>
              <span class="bc-page">{{ pageTitle }}</span>
            </div>
          </div>
        </div>
      </div>

      <div class="tb-right" *ngIf="currentUser$ | async as user">
        <div class="tb-notifications">
          <button class="notif-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
              <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/>
            </svg>
            <span class="notif-badge"></span>
          </button>
        </div>
        <div class="tb-divider"></div>
        <div class="tb-user">
          <div class="tb-avatar-wrap">
            <div class="tb-avatar">{{ initials(user) }}</div>
            <span class="tb-online"></span>
          </div>
          <div class="tb-user-info">
            <span class="tb-uname">{{ user.firstName }} {{ user.lastName }}</span>
            <span class="tb-uemail">{{ user.email }}</span>
          </div>
        </div>
      </div>
    </header>

    <!-- Content -->
    <main class="content">
      <router-outlet/>
    </main>
  </div>
</div>
