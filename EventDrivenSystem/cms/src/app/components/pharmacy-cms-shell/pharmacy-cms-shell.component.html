<div class="cms-layout">
  <nav class="cms-sidebar">
    <div class="cms-brand">
      <span>💊</span>
      <span>Pharma CMS</span>
    </div>
    <ul class="cms-nav">
      <li><a routerLink="dashboard" routerLinkActive="active">Dashboard</a></li>
      <li><a routerLink="categories" routerLinkActive="active">Categories</a></li>
      <li><a routerLink="medicines" routerLinkActive="active">Medicines</a></li>
      <li><a routerLink="prescriptions" routerLinkActive="active">Prescriptions</a></li>
      <li><a routerLink="orders" routerLinkActive="active">Orders</a></li>
    </ul>
    <div class="cms-footer-links">
      <a routerLink="/pharmacy/home">← Customer Portal</a>
      <button class="logout-btn" (click)="logout()">Logout</button>
    </div>
  </nav>
  <div class="cms-content">
    <div class="cms-topbar">
      <div></div>
      <div class="user-chip">
        <span class="avatar">{{ initials }}</span>
        <span>{{ currentUser?.firstName }} {{ currentUser?.lastName }}</span>
      </div>
    </div>
    <div class="cms-page">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
