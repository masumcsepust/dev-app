<div class="page-container">
  <div class="auth-card glass-panel" style="max-width: 500px;">
    <div class="auth-header">
      <h2 class="text-gradient">Create CMS Portal Account</h2>
      <p class="text-muted">Register as a CMS user to manage restaurants and orders.</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div *ngIf="error" class="alert alert-error">
        {{ error }}
      </div>

      <div class="form-row" style="display: flex; gap: 1rem;">
        <div class="form-group" style="flex: 1;">
          <label for="firstName">First Name</label>
          <input 
            id="firstName" 
            type="text" 
            formControlName="firstName" 
            class="form-control"
            placeholder="John"
            [ngClass]="{'is-invalid': registerForm.get('firstName')?.invalid && registerForm.get('firstName')?.touched}"
          >
        </div>
        <div class="form-group" style="flex: 1;">
          <label for="lastName">Last Name</label>
          <input 
            id="lastName" 
            type="text" 
            formControlName="lastName" 
            class="form-control"
            placeholder="Doe"
            [ngClass]="{'is-invalid': registerForm.get('lastName')?.invalid && registerForm.get('lastName')?.touched}"
          >
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input 
          id="email" 
          type="email" 
          formControlName="email" 
          class="form-control"
          placeholder="john.doe@example.com"
          [ngClass]="{'is-invalid': registerForm.get('email')?.invalid && registerForm.get('email')?.touched}"
        >
        <div class="error-message" *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
          Please enter a valid email.
        </div>
      </div>

      <div class="form-group">
        <label for="phoneNumber">Phone Number</label>
        <input 
          id="phoneNumber" 
          type="tel" 
          formControlName="phoneNumber" 
          class="form-control"
          placeholder="+1234567890"
          [ngClass]="{'is-invalid': registerForm.get('phoneNumber')?.invalid && registerForm.get('phoneNumber')?.touched}"
        >
      </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="password" formControlName="password" placeholder="Create a strong password"
              [ngClass]="{'is-invalid': registerForm.get('password')?.invalid && registerForm.get('password')?.touched}">
          </div>
          <div class="error-message" *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
            Password must be at least 6 characters long
          </div>
        </div>

        <div class="form-group">
        <label>Account type</label>
        <div class="input-wrapper">
          <i class="fas fa-user-tag input-icon"></i>
          <input type="text" formControlName="userType" value="CMS" readonly class="form-control" />
        </div>
        <small class="text-muted">This portal is reserved for CMS users only.</small>
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="registerForm.invalid || loading">
        <span *ngIf="!loading">Create Account</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>

      <div class="auth-footer">
        <p>Already have an account? <a routerLink="/login" class="text-primary hover-underline">Sign in</a></p>
      </div>
    </form>
  </div>
</div>
