<div class="hero" [style.background-image]="'url(' + bannerImage + ')'">
  <div class="hero-overlay"></div>
  <div class="container hero-content">
    <div class="hero-text-container glass-panel">
      <span class="badge badge-green mb-4">Fastest Delivery</span>
      <h1 class="hero-title">Delicious food, <br>delivered to you <span class="text-brand">fast</span></h1>
      <p class="hero-subtitle">Order from the best restaurants in town and track your delivery in real-time.</p>
      <div class="hero-actions">
        <button class="btn btn-primary">Order Now</button>
      </div>
    </div>
  </div>
</div>
