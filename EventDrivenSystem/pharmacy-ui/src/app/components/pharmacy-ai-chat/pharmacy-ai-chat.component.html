<div class="chat-widget">
  <button class="chat-toggle" (click)="toggle()" [title]="open ? 'Close chat' : 'Ask PharmaAI'">
    {{ open ? '✕' : '💊' }}
  </button>

  <div class="chat-box" [class.open]="open">
    <div class="chat-header">
      <div class="chat-header-icon">🤖</div>
      <div class="chat-header-text">
        <div class="chat-header-name">PharmaAI</div>
        <div class="chat-header-status">Online · Ready to help</div>
      </div>
      <div class="lang-toggle">
        <button [class.active]="language==='en'" (click)="switchLang('en')">EN</button>
        <button [class.active]="language==='bn'" (click)="switchLang('bn')">বাং</button>
      </div>
      <button class="close-btn" (click)="toggle()">✕</button>
    </div>

    <div class="chat-msgs">
      <div *ngFor="let m of messages" class="msg" [class.user]="m.role==='user'" [class.bot]="m.role==='assistant'">
        <div class="bubble" [innerHTML]="m.content | aiMarkdown"></div>
      </div>
      <div class="typing" *ngIf="loading">PharmaAI is thinking…</div>
    </div>

    <div class="chat-input">
      <input type="text" [(ngModel)]="input"
        [placeholder]="language==='bn' ? 'ওষুধ সম্পর্কে জিজ্ঞেস করুন…' : 'Ask about medicines…'"
        (keyup.enter)="send()" [disabled]="loading">
      <button class="btn-primary" (click)="send()" [disabled]="loading || !input.trim()">Send</button>
    </div>
  </div>
</div>
