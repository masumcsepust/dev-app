<div class="dashboard-container">
  <div class="glass-panel text-center" style="padding: 3rem;">
    <h2>Welcome to the Food Portal, {{ currentUser?.firstName }}</h2>
    <p>Discover restaurants, view menus, and order your favorite meals.</p>
    
    <div class="action-grid mt-4">
      <div class="action-card">
        <i class="fas fa-search-location"></i>
        <h3>Find Restaurants</h3>
        <p>Explore nearby places to eat</p>
        <button class="btn btn-primary">Browse</button>
      </div>
      <div class="action-card">
        <i class="fas fa-shopping-cart"></i>
        <h3>My Cart</h3>
        <p>Checkout your selected items</p>
        <button class="btn btn-outline">View Cart</button>
      </div>
      <div class="action-card">
        <i class="fas fa-history"></i>
        <h3>Order History</h3>
        <p>Track current and past orders</p>
        <button class="btn btn-outline">History</button>
      </div>
    </div>
  </div>
</div>
