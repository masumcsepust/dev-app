<div class="page-container">
  <div class="auth-card glass-panel">
    <div class="auth-header">
      <h2 class="text-gradient">CMS Portal Login</h2>
      <p class="text-muted">Only CMS users may access this portal.</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div *ngIf="error" class="alert alert-error">
        {{ error }}
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input 
          id="email" 
          type="email" 
          formControlName="email" 
          class="form-control"
          placeholder="Enter your email"
          [ngClass]="{'is-invalid': loginForm.get('email')?.invalid && loginForm.get('email')?.touched}"
        >
        <div class="error-message" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          Please enter a valid email.
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          id="password" 
          type="password" 
          formControlName="password" 
          class="form-control"
          placeholder="Enter your password"
          [ngClass]="{'is-invalid': loginForm.get('password')?.invalid && loginForm.get('password')?.touched}"
        >
        <div class="error-message" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          Password is required.
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="loginForm.invalid || loading">
        <span *ngIf="!loading">Sign In</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>

      <div class="auth-footer">
        <p>Don't have an account? <a routerLink="/register" class="text-primary hover-underline">Register here</a></p>
      </div>
      <div class="auth-footer">
        <button type="button" class="btn btn-secondary btn-block" (click)="createDefaultCmsUser()" [disabled]="loading">
          Create default CMS user
        </button>
      </div>
    </form>
  </div>
</div>
